version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /apps/dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      dashboard-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      web-minor-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Routine pip version PRs disabled (open-pull-requests-limit: 0).
  # Security fixes still arrive via Dependabot security alerts / security updates.
  - package-ecosystem: pip
    directory: /apps/email-pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 0

  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
