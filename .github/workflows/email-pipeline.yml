name: email-pipeline

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths:
      - "apps/email-pipeline/**"
      - ".github/workflows/email-pipeline.yml"
  pull_request:
    paths:
      - "apps/email-pipeline/**"
      - ".github/workflows/email-pipeline.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/email-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --group dev --group data-tools --group postgres --group lab --frozen
      - run: uv run pytest
