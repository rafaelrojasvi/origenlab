<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>OrigenLab atom mark — v1 / v2 / v3</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 24px; background: #f1f5f9;">
  <h1 style="font-size: 18px; color: #042f2e;">Atom mark @ 48px (fondo teal)</h1>
  <p style="color: #64748b; font-size: 13px;">v1 = puntos grandes · v2 = puntos muy chicos · v3 = balance (usar en firma)</p>
  <table cellpadding="16" cellspacing="12" style="border-collapse: separate;">
    <tr>
      <td style="background: #042f2e; border-radius: 8px; text-align: center;">
        <p style="color: #99f6e4; font-size: 11px; margin: 0 0 8px;">v1</p>
        <img src="origenlab-signature-mark-v1.png" width="48" height="48" alt="v1" />
      </td>
      <td style="background: #042f2e; border-radius: 8px; text-align: center;">
        <p style="color: #99f6e4; font-size: 11px; margin: 0 0 8px;">v2</p>
        <img src="origenlab-signature-mark-v2.png" width="48" height="48" alt="v2" />
      </td>
      <td style="background: #042f2e; border-radius: 8px; text-align: center; outline: 2px solid #14b8a6;">
        <p style="color: #5eead4; font-size: 11px; margin: 0 0 8px; font-weight: bold;">v3</p>
        <img src="origenlab-signature-mark-v3.png" width="48" height="48" alt="v3" />
      </td>
    </tr>
  </table>
</body>
</html>
