# Alembic — PostgreSQL target schema (see docs/pipeline/POSTGRES_SCHEMA_TARGET_V1.md).
# SQLite application code is unchanged. env.py requires ALEMBIC_DATABASE_URL or
# ORIGENLAB_POSTGRES_URL (alembic.ini sqlalchemy.url is not used as a fallback).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder only; env.py resolves the real URL from environment variables.
sqlalchemy.url = driver://

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
