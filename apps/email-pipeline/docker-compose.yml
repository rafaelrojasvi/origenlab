# Streamlit business mart only. Build from apps/email-pipeline:
#   docker compose up --build
#
# Host data directory must contain your SQLite layout (default: sqlite/emails.sqlite
# under ORIGENLAB_DATA_ROOT). Override bind source if your data lives elsewhere.

services:
  business-mart:
    build:
      context: .
      dockerfile: Dockerfile
    image: origenlab-business-mart:latest
    ports:
      - "8501:8501"
    environment:
      # Inside the container, paths are under this root unless overridden:
      ORIGENLAB_DATA_ROOT: /data/origenlab-email
      # Uncomment if DB is not at ${ORIGENLAB_DATA_ROOT}/sqlite/emails.sqlite:
      # ORIGENLAB_SQLITE_PATH: /data/origenlab-email/sqlite/emails.sqlite
    volumes:
      # Host path → container: read-only is enough (app opens SQLite immutable+RO).
      - type: bind
        source: ${ORIGENLAB_HOST_DATA_ROOT:-$HOME/data/origenlab-email}
        target: /data/origenlab-email
        read_only: true
